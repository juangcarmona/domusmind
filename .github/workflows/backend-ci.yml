name: backend-ci

on:
  pull_request:
    paths:
      - 'src/backend/**'
      - 'tests/backend/**'
      - 'DomusMind.slnx'
  push:
    branches: [ main ]
    paths:
      - 'src/backend/**'
      - 'tests/backend/**'
      - 'DomusMind.slnx'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore DomusMind.slnx

      - name: Build
        run: dotnet build DomusMind.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test DomusMind.slnx --no-build --configuration Release

      - name: Publish API
        run: |
          dotnet publish src/backend/DomusMind.Api/DomusMind.Api.csproj \
          -c Release \
          -o artifact/api

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domusmind-api
          path: artifact/api