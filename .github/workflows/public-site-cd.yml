name: public-site-cd

on:
  push:
    branches: [main]
    paths:
      - 'src/web/public/**'
      - '.github/workflows/public-site-cd.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy production site
    runs-on: ubuntu-latest

    environment:
      name: production

    defaults:
      run:
        working-directory: src/web/public

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.WEB_SITE_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src/web/public
          api_location: ""
          output_location: dist