name: public-site-ci

on:
  pull_request:
    paths:
      - 'src/web/public/**'
  push:
    branches: [ main ]
    paths:
      - 'src/web/public/**'
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: src/web/public

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/public/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: domusmind-public
          path: src/web/public/dist
