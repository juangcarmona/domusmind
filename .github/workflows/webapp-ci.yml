name: webapp-ci

on:
  pull_request:
    paths:
      - 'src/web/app/**'
      - '.github/workflows/webapp-ci.yml'
  push:
    branches: [main]
    paths:
      - 'src/web/app/**'
      - '.github/workflows/webapp-ci.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    defaults:
      run:
        working-directory: src/web/app

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/web/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
