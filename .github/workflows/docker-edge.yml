name: docker-edge

# Publishes :edge images to GHCR on every successful push to main.
# Triggered only when backend or web source changes to avoid unnecessary builds.

on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'src/web/app/**'
      - 'deploy/docker-compose.yml'
      - 'DomusMind.slnx'
      - '.github/workflows/docker-edge.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

concurrency:
  group: docker-edge
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GHCR requires lowercase image names; repository_owner may be mixed-case.
      - name: Normalise image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "DOMUSMIND_IMAGE=ghcr.io/${OWNER}/domusmind" >> "$GITHUB_ENV"

      - name: Build and push DomusMind image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/DomusMind.Api/Dockerfile
          push: true
          tags: ${{ env.DOMUSMIND_IMAGE }}:edge
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=edge
          cache-from: type=gha,scope=domusmind
          cache-to:   type=gha,scope=domusmind,mode=max
