# DomusMind — SingleInstance self-hosted stack
#
# Usage:
#   cp .env.example .env
#   # Edit .env — set DB_PASSWORD and JWT_SECRET at minimum
#   docker compose up -d
#
# This compose file defaults to SingleInstance mode (one household).
# For CloudHosted deployment, use the Azure Bicep templates in deploy/bicep/.
# See deploy/README.md for full operator instructions.

services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB:       domusmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d domusmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Postgres is intentionally not exposed on a host port.
    # Access through the domusmind service only.

  domusmind:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_OWNER:-juangcarmona}/domusmind:${VERSION:-edge}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__domusmind: "Host=postgres;Database=domusmind;Username=${DB_USER};Password=${DB_PASSWORD}"
      Jwt__SigningKey: ${JWT_SECRET}
      Jwt__Issuer:    ${JWT_ISSUER:-domusmind}
      Jwt__Audience:  ${JWT_AUDIENCE:-${JWT_ISSUER:-domusmind}}
      # Deployment mode - SingleInstance or CloudHosted
      Deployment__Mode: ${DEPLOYMENT_MODE:-SingleInstance}
      Deployment__AllowHouseholdCreation: ${ALLOW_HOUSEHOLD_CREATION:-true}
      Deployment__InvitationsEnabled: ${INVITATIONS_ENABLED:-false}
      Deployment__RequireInvitationForSignup: ${REQUIRE_INVITATION_FOR_SIGNUP:-false}
      Deployment__EmailEnabled: ${EMAIL_ENABLED:-false}
      Deployment__AdminToolsEnabled: ${ADMIN_TOOLS_ENABLED:-false}
      Deployment__MaxHouseholdsPerDeployment: ${MAX_HOUSEHOLDS_PER_DEPLOYMENT:-0}
      # First-run bootstrap admin - disable after initial setup.
      # BootstrapAdmin__Enabled:  true
      # BootstrapAdmin__Email:    ${BOOTSTRAP_ADMIN_EMAIL}
      # BootstrapAdmin__Password: ${BOOTSTRAP_ADMIN_PASSWORD}
    ports:
      - "${APP_PORT:-24365}:8080"

volumes:
  postgres_data:
